<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>クリックカウンターゲーム</title>
<style>
  body { font-family: sans-serif; text-align: center; background: #f7fbff; margin: 0; padding: 30px; }
  .card { max-width: 520px; margin: 0 auto; background: white; padding: 24px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
  h1 { margin-top: 0; }
  .big { font-size: 3rem; margin: 16px 0; }
  button { font-size: 1.2rem; padding: 14px 24px; border: none; border-radius: 14px; cursor: pointer; margin: 8px; }
  #tapBtn { background: #4f8cff; color: white; }
  #startBtn { background: #18a558; color: white; }
  .info { font-size: 1.1rem; margin: 8px 0; }
</style>
</head>
<body>
  <div class="card">
    <h1>🎯 クリックカウンターゲーム</h1>
    <p>スタートを押したら10秒間でどれだけクリックできるかな？</p>
    <div class="info">残り時間: <span id="time">10</span> 秒</div>
    <div class="big" id="score">0</div>
    <button id="tapBtn" disabled>ここを連打！</button><br>
    <button id="startBtn">スタート</button>
    <p id="message"></p>
  </div>

<script>
let score = 0;
let timeLeft = 10;
let timer = null;
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const msgEl = document.getElementById("message");
const tapBtn = document.getElementById("tapBtn");
const startBtn = document.getElementById("startBtn");

tapBtn.addEventListener("click", () => {
  score++;
  scoreEl.textContent = score;
});

startBtn.addEventListener("click", () => {
  score = 0;
  timeLeft = 10;
  scoreEl.textContent = score;
  timeEl.textContent = timeLeft;
  msgEl.textContent = "";
  tapBtn.disabled = false;
  startBtn.disabled = true;

  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) {
      clearInterval(timer);
      tapBtn.disabled = true;
      startBtn.disabled = false;
      let rank = "まだまだ！";
      if (score >= 80) rank = "すごい！超高速！";
      else if (score >= 50) rank = "かなり速い！";
      else if (score >= 30) rank = "いい感じ！";
      msgEl.textContent = `結果: ${score}回クリック！ ${rank}`;
    }
  }, 1000);
});
</script>
</body>
</html>
