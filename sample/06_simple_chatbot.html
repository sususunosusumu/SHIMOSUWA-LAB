<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI風チャットボット</title>
<style>
  body { font-family: sans-serif; background: #eef8f0; margin: 0; padding: 24px; }
  .app { max-width: 700px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
  #chat { min-height: 320px; border: 1px solid #ddd; border-radius: 14px; padding: 14px; background: #fafafa; overflow-y: auto; }
  .msg { margin: 10px 0; padding: 10px 12px; border-radius: 12px; max-width: 80%; }
  .user { background: #d7ecff; margin-left: auto; }
  .bot { background: #e8f6e8; }
  .row { display: flex; gap: 10px; margin-top: 12px; }
  input { flex: 1; padding: 12px; font-size: 1rem; border-radius: 12px; border: 1px solid #ccc; }
  button { padding: 12px 18px; font-size: 1rem; border: none; border-radius: 12px; background: #26a65b; color: white; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <h1>💬 AI風チャットボット</h1>
  <div id="chat"></div>
  <div class="row">
    <input id="input" type="text" placeholder="話しかけてみよう">
    <button id="send">送信</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const send = document.getElementById("send");

function addMessage(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function getReply(text) {
  const t = text.toLowerCase();

  if (text.includes("こんにちは")) return "こんにちは！ 今日もいい日だね。";
  if (text.includes("疲れ")) return "おつかれさま。少し休もう。";
  if (text.includes("名前")) return "ぼくはHTMLチャットボットです。";
  if (text.includes("天気")) return "今日は自分の気分を晴れにしていこう。";
  if (text.includes("ありがとう")) return "どういたしまして！";
  if (t.includes("hello")) return "Hello! Nice to meet you.";
  return "なるほど！ もう少し詳しく教えて。";
}

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, "user");
  const reply = getReply(text);
  setTimeout(() => addMessage(reply, "bot"), 250);
  input.value = "";
  input.focus();
}

send.addEventListener("click", sendMessage);
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendMessage();
});

addMessage("こんにちは！ 何か話しかけてみてね。", "bot");
</script>
</body>
</html>
