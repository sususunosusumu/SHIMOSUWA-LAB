<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>お絵かきアプリ</title>
<style>
  body { font-family: sans-serif; text-align: center; background: #fffaf2; margin: 0; padding: 24px; }
  .wrap { max-width: 900px; margin: 0 auto; }
  canvas { background: white; border: 3px solid #333; border-radius: 12px; touch-action: none; }
  .tools { margin-bottom: 16px; }
  button, input { margin: 6px; padding: 10px 14px; font-size: 1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎨 お絵かきアプリ</h1>
  <div class="tools">
    色: <input type="color" id="color" value="#ff0000">
    太さ: <input type="range" id="size" min="1" max="30" value="5">
    <button id="clearBtn">ぜんぶ消す</button>
  </div>
  <canvas id="canvas" width="800" height="500"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const colorEl = document.getElementById("color");
const sizeEl = document.getElementById("size");
const clearBtn = document.getElementById("clearBtn");

let drawing = false;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  drawing = true;
  const pos = getPos(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function draw(e) {
  if (!drawing) return;
  const pos = getPos(e);
  ctx.lineTo(pos.x, pos.y);
  ctx.strokeStyle = colorEl.value;
  ctx.lineWidth = sizeEl.value;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.stroke();
}

function stopDraw() {
  drawing = false;
}

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mousemove", draw);
window.addEventListener("mouseup", stopDraw);

canvas.addEventListener("touchstart", (e) => { e.preventDefault(); startDraw(e); });
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); draw(e); });
window.addEventListener("touchend", stopDraw);

clearBtn.addEventListener("click", () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});
</script>
</body>
</html>
