<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下諏訪・諏訪 ローカル交通 時刻表検索</title>

<style>
body {
  font-family: system-ui;
  margin: 0;
  background: #f5f6f8;
}

header {
  background: #0f172a;
  color: white;
  padding: 40px 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-top: 20px;
}

button {
  background: #0f172a;
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 8px;
  cursor: pointer;
}

.result-row {
  padding: 12px;
  border-bottom: 1px solid #ddd;
  cursor: pointer;
}

.result-row:hover {
  background: #f1f5f9;
}

.time {
  font-size: 20px;
  font-weight: bold;
  font-variant-numeric: tabular-nums;
}
</style>
</head>

<body>

<header>
  <h1>下諏訪・諏訪 ローカル交通 時刻表検索</h1>
</header>

<div class="container">

  <div class="card">
    <label>基準時刻</label>
    <input type="time" id="baseTime" value="08:00">
    <br><br>
    <button onclick="search()">この後の便を表示</button>
  </div>

  <div class="card">
    <h2>検索結果</h2>
    <div id="result"></div>
  </div>

</div>

<script>

// ===== 仮GTFSデータ =====
const stops = {
  S1: "下諏訪駅",
  S2: "食祭館南",
  S3: "秋宮南",
  S4: "武居",
  S5: "向陽台入口",
  S6: "武居北",
  S7: "下諏訪向陽高校",
};

const stopTimes = [
  {trip_id:"T1", stop_id:"S1", departure_time:"07:05:00", stop_sequence:1},
  {trip_id:"T1", stop_id:"S2", departure_time:"07:07:00", stop_sequence:2},
  {trip_id:"T1", stop_id:"S3", departure_time:"07:08:00", stop_sequence:3},
  {trip_id:"T1", stop_id:"S4", departure_time:"07:09:00", stop_sequence:4},

  {trip_id:"T2", stop_id:"S1", departure_time:"08:05:00", stop_sequence:1},
  {trip_id:"T2", stop_id:"S2", departure_time:"08:07:00", stop_sequence:2},
  {trip_id:"T2", stop_id:"S3", departure_time:"08:08:00", stop_sequence:3},
  {trip_id:"T2", stop_id:"S4", departure_time:"08:09:00", stop_sequence:4},

  {trip_id:"T3", stop_id:"S1", departure_time:"12:41:00", stop_sequence:1},
];

// ===== 時刻フォーマット修正 =====
function formatTime(timeStr) {
  const p = timeStr.split(":");
  return `${p[0].padStart(2,"0")}:${p[1].padStart(2,"0")}`;
}

// ===== 分変換 =====
function toMinutes(t) {
  const p = t.split(":");
  return parseInt(p[0])*60 + parseInt(p[1]);
}

// ===== 検索 =====
function search() {

  const base = document.getElementById("baseTime").value;
  const baseMin = toMinutes(base);

  const result = document.getElementById("result");
  result.innerHTML = "";

  // tripごとに代表時刻を取得
  const trips = {};

  stopTimes.forEach(s => {
    if (!trips[s.trip_id] && s.stop_sequence === 1) {
      trips[s.trip_id] = s.departure_time;
    }
  });

  Object.keys(trips).forEach(tripId => {

    if (toMinutes(trips[tripId]) >= baseMin) {

      const row = document.createElement("div");
      row.className = "result-row";

      row.innerHTML = `
        <span class="time">${formatTime(trips[tripId])}</span>
        &nbsp;&nbsp; あざみ号 武居線
      `;

      row.onclick = () => openTripWindow(tripId);

      result.appendChild(row);
    }

  });

  if (result.innerHTML === "") {
    result.innerHTML = "該当する便がありません";
  }
}

// ===== 別ウィンドウ表示（これが前回仕様） =====
function openTripWindow(tripId) {

  const tripStops = stopTimes
    .filter(s => s.trip_id === tripId)
    .sort((a,b) => a.stop_sequence - b.stop_sequence);

  const w = window.open("", "_blank");

  w.document.write(`
    <html>
    <head>
      <title>便の詳細</title>
      <style>
        body { font-family: system-ui; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; }
        .time { font-variant-numeric: tabular-nums; font-weight: bold; }
      </style>
    </head>
    <body>
      <h1>便の詳細</h1>
      <table>
        <tr><th>順番</th><th>停留所</th><th>発車時刻</th></tr>
        ${tripStops.map(s => `
          <tr>
            <td>${s.stop_sequence}</td>
            <td>${stops[s.stop_id]}</td>
            <td class="time">${formatTime(s.departure_time)}</td>
          </tr>
        `).join("")}
      </table>
    </body>
    </html>
  `);

  w.document.close();
}

</script>

</body>
</html>
