}
function search(){
  let r=routeSel.value, stop=stopSel.value, base=toMin(document.getElementById('time').value), svc=document.getElementById('service').value;
  let rows=DATA.filter(d=>(r==='ALL'||d.route_id===r)&&d.stop===stop);
  rows=rows.filter(d=>d.service_id==='DAILY'||d.service_id===svc);
  rows=rows.map(d=>Object.assign({},d,{min:toMin(d.time)})).filter(d=>d.min>=base).sort((a,b)=>a.min-b.min).slice(0,30);
  document.getElementById('result').innerHTML=rows.length?`<table><tr><th>時刻</th><th>路線</th><th>便</th><th>運行区分</th><th>全停留所</th></tr>${rows.map(d=>`<tr><td><strong>${d.time.slice(0,5)}</strong></td><td>${esc(d.long)}</td><td><button type="button" onclick="openTripWindow('${esc(d.trip_id)}')">${esc(d.headsign)}</button></td><td>${esc(d.service_id)}</td><td><button type="button" onclick="openTripWindow('${esc(d.trip_id)}')">表示</button></td></tr>`).join('')}</table><p class="muted">便名または「表示」を押すと、その便の全停留所と発車時刻を別ウィンドウで開きます。</p>`:'該当する便がありません。';
}
init();</script></main></body></html>
