<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shimosuwa Lab | AIでものづくり教室 — 参加者募集</title>
<meta name="description" content="下諏訪Lab が行う「AIでものづくり教室」の募集ページ。AIを使って、アプリ・作文・自己紹介・未来予想図など、自分の作りたいものを形にする教室です。参加費無料・5月下旬開催・先着3名。">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="hero.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "sectionStyle": "card",
  "columns": 4,
  "headerBg": "paper"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);

  // Reveal-on-scroll
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) e.target.classList.add("in");
      });
    }, { threshold: 0.12 });
    document.querySelectorAll(".reveal").forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);

  return (
    <>
      <Hero />
      <div className="reveal"><Concept /></div>
      <div className="reveal"><FlowTour /></div>
      <div className="reveal"><Contents sectionStyle={tweaks.sectionStyle} columns={tweaks.columns} /></div>
      <div className="reveal"><Reflection /></div>
      <div className="reveal"><Outcomes /></div>
      <div className="reveal"><Faq /></div>
      <div className="reveal"><Join /></div>
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection title="セクションの見せ方">
          <TweakRadio
            label="カード or フラット"
            value={tweaks.sectionStyle}
            onChange={v => setTweaks({ sectionStyle: v })}
            options={[
              { value: "card",  label: "カード" },
              { value: "flat",  label: "フラット" },
            ]}
          />
          <TweakRadio
            label="カラム数（できることセクション）"
            value={String(tweaks.columns)}
            onChange={v => setTweaks({ columns: Number(v) })}
            options={[
              { value: "1", label: "1" },
              { value: "2", label: "2" },
              { value: "4", label: "4" },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
