<h1>GitHubってなに？</h1>
<p>
GitHubは、自分が作ったファイルを保存して、あとから直したり、
そしてウェブで公開することもできる場所です。
</p>

<h2>かんたんに言うと</h2>
<ul>
<li>ファイルをしまっておく場所</li>
<li>どこを直したか記録できる場所</li>
<li>作ったものを見せられる場所</li>
</ul>

<h2>下諏訪Labでの使い方</h2>
<p>
AIで作ったHTMLファイルをGitHubにアップすると、
それをそのままウェブページとして見ることができます。
</p>

<h2>流れ</h2>
<ol>
<li>AIでHTMLを作る</li>
<li>GitHubにアップする</li>
<li>ブラウザで開く</li>
</ol>

<p>
つまりGitHubは「作ったものを形にして見せる場所」です。
</p>
